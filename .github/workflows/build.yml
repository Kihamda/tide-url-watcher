name: Build

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - run: dotnet publish src/Tide.App/Tide.App.csproj --configuration Release --runtime win-x64 --self-contained false --output artifacts/Tide-Windows-x64
      - uses: actions/upload-artifact@v7
        with:
          name: Tide-Windows-x64
          path: artifacts/Tide-Windows-x64
