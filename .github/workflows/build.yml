name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - run: dotnet publish src/Tide.App/Tide.App.csproj --configuration Release --runtime win-x64 --self-contained false --output artifacts/Tide-Windows-x64
      - name: Add package docs
        shell: pwsh
        run: Copy-Item -LiteralPath README.md -Destination artifacts/Tide-Windows-x64/README.md
      - name: Package Windows app
        shell: pwsh
        run: |
          $files = Get-ChildItem -LiteralPath artifacts/Tide-Windows-x64 -Force |
            Where-Object Name -ne "Data"
          Compress-Archive -Path $files.FullName -DestinationPath artifacts/Tide-Windows-x64.zip
      - uses: actions/upload-artifact@v7
        with:
          name: Tide-Windows-x64
          path: artifacts/Tide-Windows-x64.zip
      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "v0.0.${{ github.run_id }}"
          gh release create $tag artifacts/Tide-Windows-x64.zip --repo "${{ github.repository }}" --target "${{ github.sha }}" --generate-notes --title "Tide $tag"
