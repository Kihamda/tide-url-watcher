name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - run: dotnet publish src/Tide.App/Tide.App.csproj --configuration Release --runtime win-x64 --self-contained false --output artifacts/Tide-Windows-x64
      - name: Package Windows app
        shell: pwsh
        run: Compress-Archive -Path artifacts/Tide-Windows-x64/* -DestinationPath artifacts/Tide-Windows-x64.zip
      - uses: actions/upload-artifact@v7
        with:
          name: Tide-Windows-x64
          path: artifacts/Tide-Windows-x64.zip

  publish:
    needs:
      - windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" artifacts/* --generate-notes --title "Tide $GITHUB_REF_NAME"
