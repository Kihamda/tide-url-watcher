version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      react-native:
        patterns:
          - react
          - react-native
          - react-native-windows
          - react-native-macos
          - "@react-native/*"
          - "@react-native-community/*"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
